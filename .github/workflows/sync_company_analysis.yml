name: Sync company_analysis submodule

on:
  schedule:
    # daily at 02:30 UTC
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Update submodule to latest main
        run: |
          set -eux
          git submodule update --init --recursive
          cd docs/company/content/company_analysis
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          cd -
          git add docs/company/content/company_analysis
          if git diff --cached --quiet; then
            echo "No submodule update."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync company_analysis submodule"

      - name: Push
        if: success()
        run: |
          # Push back to main; this will trigger Deploy workflow
          git push
