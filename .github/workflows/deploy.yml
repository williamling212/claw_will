name: Deploy VitePress site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout private content repos
        env:
          CONTENT_TOKEN: ${{ secrets.COMPANY_ANALYSIS_TOKEN }}
        run: |
          set -eux
          # Clone private content repos into docs path
          rm -rf docs/company/content/company_analysis
          git clone \
            "https://x-access-token:${CONTENT_TOKEN}@github.com/williamling212/company_analysis.git" \
            docs/company/content/company_analysis

          rm -rf docs/econ/content/economic_observation
          git clone \
            "https://x-access-token:${CONTENT_TOKEN}@github.com/williamling212/economic_observation.git" \
            docs/econ/content/economic_observation

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate auto indexes
        run: |
          node scripts/generate_company_index.mjs
          node scripts/generate_econ_index.mjs

      - name: Build
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
